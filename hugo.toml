baseURL = 'https://kindlemodding.org/'
languageCode = 'en-gb'
title = 'Kindle Modding Wiki'
disableKinds = ['taxonomy'] # We don't use this lol
uglyURLs = true
disablePathToLower = true

[outputFormats.search_index]
  MediaType              = "application/json"
  BaseName               = "search_index"
  IsHTML                 = false
  IsPlainText            = true
  Rel                    = "search_index"

[outputs]
  home                   = [ "html", "search_index"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      [markup.goldmark.parser.attribute]
        block = true

[permalinks]
  page = ":contentbasename"

[security]
  allowContent = ['.*', 'text/html']
  enableInlineShortcodes = false
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^node$', '^postcss$', '^tailwindcss$']
    osEnv = ['(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$']
  [security.funcs]
    getenv = ['^HUGO_', '^CI$']
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['(?i)^https?://[a-z0-9]', '! ^https?://\d+\.', '! (?i)localhost', '! (?i)^https?://[^/?#]*@']
  [security.node]
    [security.node.permissions]
      allowAddons = ['tailwindcss']
      allowChildProcess = ['tailwindcss']
      allowRead = ['.']
      allowWorker = ['tailwindcss']
      allowWrite = []
      disable = false